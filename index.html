<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学霸帝AI - 本地智能ai助手</title>
  <meta name="description" content="学霸帝AI - 本地智能助手,无需 GPU,无需联网,保护隐私." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep: #0B0E14;
      --bg: #10141C;
      --surface: #181D28;
      --surface-hover: #1F2535;
      --border: #252B3B;
      --text: #E8EAF0;
      --text-dim: #7C829A;
      --gold: #D4A853;
      --gold-light: #E8C97A;
      --gold-dark: #A07830;
      --red: #E05252;
      --green: #3EBB7A;
      --blue: #4A9EEB;
      --radius: 14px;
      --radius-sm: 10px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ── Background Atmosphere ── */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(212,168,83,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -200px;
      left: -200px;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(74,158,235,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Noise Overlay ── */
    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── Container ── */
    .container {
      position: relative;
      z-index: 1;
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ── Header ── */
    header {
      padding: 32px 0 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 3px;
      margin-top: 6px;
    }
    .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--red);
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Search ── */
    .search-wrap {
      padding: 28px 0 20px;
    }
    .search-box {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50px;
      overflow: hidden;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-box:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,168,83,0.15);
    }
    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      padding: 15px 24px;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
    }
    .search-box input::placeholder { color: var(--text-dim); }
    .search-box button {
      background: var(--gold);
      border: none;
      color: var(--bg-deep);
      padding: 0 28px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
      letter-spacing: 1px;
    }
    .search-box button:hover { background: var(--gold-light); }

    /* ── Stats Bar ── */
    .stats {
      display: flex;
      gap: 24px;
      padding: 16px 0 28px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 28px;
    }
    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }
    .stat-num {
      font-family: 'DM Mono', monospace;
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
    }
    .stat-label {
      font-size: 11px;
      letter-spacing: 1px;
    }
    .divider-v {
      width: 1px;
      height: 36px;
      background: var(--border);
    }

    /* ── Section ── */
    .section { margin-bottom: 36px; }
    .section-head {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .section-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--gold);
      background: rgba(212,168,83,0.1);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(212,168,83,0.15);
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      transition: all 0.25s ease;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .card:hover {
      background: var(--surface-hover);
      border-color: #353C52;
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .card:hover::before { opacity: 1; }
    .card:active { transform: translateY(-1px); }

    .card-icon {
      width: 50px;
      height: 50px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      position: relative;
    }
    .card-icon::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-dim);
    }
    .card-arrow {
      color: var(--text-dim);
      font-size: 18px;
      transition: transform 0.2s, color 0.2s;
      flex-shrink: 0;
    }
    .card:hover .card-arrow {
      transform: translateX(4px);
      color: var(--gold);
    }

    /* ── Card Color Accents ── */
    .card[data-color="blue"]::before { background: var(--blue); }
    .card[data-color="red"]::before { background: var(--red); }
    .card[data-color="orange"]::before { background: #E8943A; }
    .card[data-color="green"]::before { background: var(--green); }
    .card[data-color="purple"]::before { background: #9B6DFF; }
    .card[data-color="gold"]::before { background: var(--gold); }
    .card[data-color="navy"]::before { background: #5B7FD6; }
    .card[data-color="cyan"]::before { background: #3ABDB0; }
    .card[data-color="teal"]::before { background: #2A9D8F; }

    .icon-blue { background: rgba(74,158,235,0.12); }
    .icon-red { background: rgba(224,82,82,0.12); }
    .icon-orange { background: rgba(232,148,58,0.12); }
    .icon-green { background: rgba(62,187,122,0.12); }
    .icon-purple { background: rgba(155,109,255,0.12); }
    .icon-gold { background: rgba(212,168,83,0.12); }
    .icon-navy { background: rgba(91,127,214,0.12); }
    .icon-cyan { background: rgba(58,189,176,0.12); }
    .icon-teal { background: rgba(42,157,143,0.12); }

    /* ── Footer ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 24px 0;
      text-align: center;
      margin-top: 20px;
    }
    .footer-text {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }
    .footer-text span { color: var(--gold); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .section { animation: fadeUp 0.5s ease both; }
    .section:nth-child(1) { animation-delay: 0.05s; }
    .section:nth-child(2) { animation-delay: 0.12s; }
    .section:nth-child(3) { animation-delay: 0.19s; }

    /* ── No Results ── */
    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }
    .no-results-icon { font-size: 48px; margin-bottom: 16px; }

    /* ── Mobile ── */
    @media (max-width: 640px) {
      .logo { font-size: 28px; }
      .grid { grid-template-columns: 1fr; }
      .stats { flex-wrap: wrap; gap: 16px; }
      .divider-v { display: none; }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-deep); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
  </style>
</head>
<body>

<div class="noise"></div>

<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">学霸帝AI - 本地多模态AI助手</div>
    <div class="subtitle"><span class="live-dot"></span>网址XueBaDi.GitHub.io</div>
  </header>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="AI搜索..." />
      <button onclick="doSearch()">搜索</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item">
      <div>
        <div class="stat-num">Qwen2.5-VL</div>
        <div class="stat-label">多模态ai模型</div>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="stat-item">
      <div>
        <div class="stat-num">完全离线</div>
        <div class="stat-label">无需联网.保护隐私</div>
      </div>
    </div>
    <div class="divider-v"></div>
    <div class="stat-item">
      <div>
        <div class="stat-num">免费开源</div>
        <div class="stat-label">基于llama.cpp本地推理</div>
      </div>
    </div>
  </div>

  <!-- Main -->
  <main id="main"></main>

  <!-- Footer -->
  <footer>
    <div class="footer-text"><span>学霸帝AI</span> · 本地智能ai助手·无需联网·保护隐私 · 2026</div>
  </footer>

</div>

<script>
  var sites = [
    {
      category: "苹果电脑",
      items: [
        { name: "苹果电脑", desc: " xuebadi-macOS.dmg", icon: "🌍", color: "blue", cls: "icon-blue", url: "https://github.com/xuebadi/ai/releases/download/v1.0.0/xuebadi-macOS.dmg" },
      ]
    },
    {
      category: "windos10/11",
      items: [
        { name: "windos10/11", desc: "xuebadi-win.zip", icon: "🧑‍💻", color: "green", cls: "icon-green", url: "https://github.com/xuebadi/ai/releases/download/v1.0.0/xuebadi-win.zip" },
      ]
    },
    {
      category: "鸿蒙或安卓手机",
      items: [
        { name: "鸿蒙或安卓手机", desc: "xuebadi-HarmonyOS.apk", icon: "📲",  color: "gold", cls: "icon-gold", url:"https://github.com/xuebadi/ai/releases/download/v1.0.0/xuebadi-HarmonyOS.apk" },
      ]
    },
    {
      category: "GitHub",
      items: [
        { name: "学霸帝AI", desc: "xuebadi/ai", icon: "🤖", color: "navy", cls: "icon-navy", url: "https://github.com/xuebadi/ai/" },
      ]
    },
    {
      category: "广金网",
      items: [
        { name: "广金网", desc: "金属行情一键导航", icon: "📅", color: "teal", cls: "icon-teal", url: "https://tongbao2.github.io/" },
      ]
    }
  ];

  function render(filter) {
    var main = document.getElementById('main');
    var html = '';
    var total = 0;

    for (var i = 0; i < sites.length; i++) {
      var section = sites[i];
      var items = [];

      for (var j = 0; j < section.items.length; j++) {
        var s = section.items[j];
        if (!filter || s.name.indexOf(filter) !== -1 || s.desc.indexOf(filter) !== -1) {
          items.push(s);
        }
      }

      if (items.length === 0) continue;
      total += items.length;

      html += '<div class="section">';
      html += '<div class="section-head">';
      html += '<span class="section-tag">' + section.category + '</span>';
      html += '<div class="section-line"></div>';
      html += '</div>';
      html += '<div class="grid">';

      for (var k = 0; k < items.length; k++) {
        var item = items[k];
        html += '<a class="card" data-color="' + item.color + '" href="' + item.url + '" target="_blank" rel="noopener">';
        html += '<div class="card-icon ' + item.cls + '">' + item.icon + '</div>';
        html += '<div class="card-info">';
        html += '<div class="card-name">' + item.name + '</div>';
        html += '<div class="card-desc">' + item.desc + '</div>';
        html += '</div>';
        html += '<div class="card-arrow">→</div>';
        html += '</a>';
      }

      html += '</div></div>';
    }

    if (total === 0) {
      html = '<div class="no-results"><div class="no-results-icon">🔍</div><div>未找到相关网站</div></div>';
    }

    main.innerHTML = html;
  }

  function doSearch() {
    var val = document.getElementById('searchInput').value.trim();
    render(val);
  }

  document.getElementById('searchInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doSearch();
  });

  document.getElementById('searchInput').addEventListener('input', function() {
    var val = this.value.trim();
    if (val.length > 0) {
      render(val);
    } else {
      render('');
    }
  });

  render('');
</script>
</body>
</html>
